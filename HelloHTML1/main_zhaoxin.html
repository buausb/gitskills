<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>main</title>
		<style>
			body{
				width: 100%;
				background-image: url("img/zhaoxin22.jpg");
				background-size: cover;
				margin: 0;
			}
			div{
				margin-top: 0;
				padding: 0;
			}
			a{
				display: block;
				text-decoration: none;
				color: #FE9A2E;
			}
			.title{
				
				text-align: center;
				color: gold;
				font-size: 50px;
				font-style: italic;
				font-weight: bold;
			}
			.name{
				font-size: 40px;
				font-weight: bold;
				font-style: italic;
			}
			.top{
				width: 100%;
				height: 50px;
				background-image: url("img/zhaoxintop.png");
				background-size: cover;
				float: top;
			}
			.left{
				position: relative;
				width: 260px;
				height: 800px;
				float: left;
				background-color: #151515;
				
			}
			.aiouniya{
				position: absolute;
				bottom: 0;
				
				width: 100%;
				height: 32%;
				background-image: url("img/demaxiyatubiao.png");
				background-size: cover;
			}
			.content{
				position: absolute;
				width: 100%;
				height: 55%;
				
				background-image: linear-gradient(to bottom,#151515,#1C1C1C);
				writing-mode: vertical-lr;
				font-weight: bold;
				font-size: 30px;
				font-style: italic;
				color: white;
				text-align: center;
			}
			.right{
				background-color: rgb(0,0,0,0.6);
				width: 50%;
				height: 800px;
				float: left;
				text-align: center;
			}
			.story{
				padding: 0 200px;
				margin: 50px;
				background-color: rgb(255,255,255,0);
				width: 30%;
				color: white;
			}
			.cont{
				margin:100px ;
				border: gray solid 3px;
				color: gold;
			}
			.area{
				margin: 0;
				pad: 0;
				position: absolute;
				width: 100%;
				height: 32%;
				z-index: 3;
				bottom: 0;
				background-color: rgb(0,0,0,0);
				transition: all ease .5s;
			}
			.area:hover{
				background-color: rgb(0,0,0,0.5);
			}
			.areaname{
				position: absolute;
				width: 100%;
				height: 20px;
				font-weight: bold;
				font-size: 20px;
				color: white;
				text-align: center;
				top: 0;
				left: -100%;
				transition: all ease .5s;
				
			}
			.area:hover .areaname{
				left: 0;
			}
			.areastory{
				position: absolute;
				width: 70%;
				height: 100%;
				text-align: center;
				left: 50px;
				color: white;
				top: 100%;
				transition: all ease .5s;
			}
			.area:hover .areastory{
				top: 0;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div class="top">
			
		</div>
		<div class="left">
			<img src="img/zhaoxintouxiang.png" width="260px" height="100px">
			<div class="content">
				<br/>
				<br/>
				 “人之死，难免也。可免者，唯败也。”

				<br/>
				<br/>
				
				~ 赵信		 
			</div>
			<div class="aiouniya">
				
			</div>
			<div class="area">
				<div class="areaname">
					德玛西亚
				</div>
				<div class="areastory">
					<br/>
			
					   德玛西亚是一个法理至上的强大王国，
					   战功赫赫，久负盛名。德玛西亚人自古崇尚正义、荣耀和责任，
					   近乎狂热地以自身的传统及底蕴为豪。
					   然而，尽管秉持着这些高尚的原则，
					   在过去的几百年间，刚愎自用的德玛西亚越发与世隔绝，
					   成为了孤立主义的代名词。
				</div>
			</div>
		</div>
		<div class="right">
			<font class="title">枪出入龙!</font>
			<br/>
			<div class="story">
				<font class="name"><ins>赵</ins></font>
				信是效忠于德玛西亚皇室家族的坚毅勇士。 
				他曾经沦落于诺克萨斯的角斗场， 在无数次角斗中得以幸存。
				 直到他在战场上面对过嘉文三世， 才决定放弃自己曾经的人生， 
				并为更加荣耀的大业效力。 有最称手的三爪长枪相伴， 
				赵信现在为自己的第二祖国而战， 一往无前，九死无悔。
			</div>
			<div class="cont">
				<a href="https://yz.lol.qq.com/zh_CN/story/champion/xinzhao/"><font class="name">阅读传记</font></a>
			</div>
		</div>
	</body>

</html>
