<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>main</title>
		<style>
			body{
				width: 100%;
				background-image: url("img/nvhuang22.jpg");
				background-size: cover;
				margin: 0;
			}
			div{
				margin-top: 0;
				padding: 0;
			}
			a{
				display: block;
				text-decoration: none;
				color: #FE9A2E;
			}
			.title{
				
				text-align: center;
				color: gold;
				font-size: 50px;
				font-style: italic;
				font-weight: bold;
			}
			.name{
				font-size: 40px;
				font-weight: bold;
				font-style: italic;
			}
			.top{
				width: 100%;
				height: 50px;
				background-image: url("img/nvhuangtop.png");
				background-size: cover;
				float: top;
			}
			.left{
				position: relative;
				width: 260px;
				height: 800px;
				float: left;
				background-color: #151515;
				
			}
			.aiouniya{
				position: absolute;
				bottom: 0;
				
				width: 100%;
				height: 32%;
				background-image: url("img/xukongzhidi.png");
				background-size: cover;
			}
			.content{
				position: absolute;
				width: 100%;
				height: 55%;
				
				background-image: linear-gradient(to bottom,#151515,#1C1C1C);
				writing-mode: vertical-lr;
				font-weight: bold;
				font-size: 30px;
				font-style: italic;
				color: white;
				text-align: center;
			}
			.right{
				background-color: rgb(0,0,0,0.6);
				width: 50%;
				height: 800px;
				float: left;
				text-align: center;
			}
			.story{
				padding: 0 200px;
				margin: 50px;
				background-color: rgb(255,255,255,0);
				width: 30%;
				color: white;
			}
			.cont{
				margin:100px ;
				border: gray solid 3px;
				color: gold;
			}
			.area{
				margin: 0;
				pad: 0;
				position: absolute;
				width: 100%;
				height: 32%;
				z-index: 3;
				bottom: 0;
				background-color: rgb(0,0,0,0);
				transition: all ease .5s;
			}
			.area:hover{
				background-color: rgb(0,0,0,0.5);
			}
			.areaname{
				position: absolute;
				width: 100%;
				height: 20px;
				font-weight: bold;
				font-size: 20px;
				color: white;
				text-align: center;
				top: 0;
				left: -100%;
				transition: all ease .5s;
				
			}
			.area:hover .areaname{
				left: 0;
			}
			.areastory{
				position: absolute;
				width: 70%;
				height: 100%;
				text-align: center;
				left: 50px;
				color: white;
				top: 100%;
				transition: all ease .5s;
			}
			.area:hover .areastory{
				top: 0;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div class="top">
			
		</div>
		<div class="left">
			<img src="img/nvhuangtouxiang.png" width="260px" height="100px">
			<div class="content">
				<br/>
				<br/>
				“这个世界不会彻底湮灭。我将取而代之，如同一个孩子将父母吞噬。”
			
			
				<br/>	
				~ 卑尔维斯
			</div>
			<div class="aiouniya">
				
			</div>
			<div class="area">
				<div class="areaname">
					虚空之地
				</div>
				<div class="areastory">
					<br/>
					<br/>
					 伴着宇宙的诞生，一声尖叫宣示了虚空的开端。
					 虚空代表着境界彼端某种不可知的虚无。
					 它是一种不知餍足的饥饿，经过永世的等待，
					 直到它的主人，神秘的监视者们发号施令，迎来最终的万物消解。
				</div>
			</div>
			
			
		</div>
		<div class="right">
			<font class="title">吞噬，成为！</font>
			<br/>
			<div class="story">
				<font class="name"><i>一</i></font>
				座被吞噬的城市，哺育了一位噩梦般的女皇。
				卑尔维斯就是符文之地的终结……也是她亲手规划的可怖现实的开端。
				地上世界无数世代的历史、
				知识和记忆驱使着她不知餍足地吞食所过之处的一切体验和情感。
				然而，区区一个世界完全不能满足她的胃口。卑尔维斯将眼光投向了虚空曾经的主人……
			</div>
			<div class="cont">
				<a href="https://yz.lol.qq.com/zh_CN/story/champion/belveth/"><font class="name">阅读传记</font></a>
			</div>
		</div>
	</body>

</html>
