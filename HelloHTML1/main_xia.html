<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>main</title>
		<style>
			body{
				width: 100%;
				background-image: url("img/xia222.jpg");
				background-size: cover;
				margin: 0;
			}
			div{
				margin-top: 0;
				padding: 0;
			}
			a{
				display: block;
				text-decoration: none;
				color: #FE9A2E;
			}
			.title{
				
				text-align: center;
				color: gold;
				font-size: 50px;
				font-style: italic;
				font-weight: bold;
			}
			.name{
				font-size: 40px;
				font-weight: bold;
				font-style: italic;
			}
			.top{
				width: 100%;
				height: 50px;
				background-image: url("img/xiatop.png");
				background-size: cover;
				float: top;
			}
			.left{
				position: relative;
				width: 260px;
				height: 800px;
				float: left;
				background-color: #151515;
				
			}
			.aiouniya{
				position: absolute;
				bottom: 0;
				
				width: 100%;
				height: 32%;
				background-image: url("img/yiaiouniya.png");
				background-size: cover;
			}
			.content{
				position: absolute;
				width: 100%;
				height: 55%;
				
				background-image: linear-gradient(to bottom,#151515,#1C1C1C);
				writing-mode: vertical-lr;
				font-weight: bold;
				font-size: 30px;
				font-style: italic;
				color: white;
				text-align: center;
			}
			.right{
				background-color: rgb(255,255,255,0.6);
				width: 50%;
				height: 800px;
				float: left;
				text-align: center;
			}
			.story{
				padding: 0 200px;
				margin: 50px;
				background-color: rgb(255,255,255,0);
				width: 30%;
			}
			.cont{
				margin:100px ;
				border: gray solid 3px;
				color: gold;
			}
			.area{
				margin: 0;
				pad: 0;
				position: absolute;
				width: 100%;
				height: 32%;
				z-index: 3;
				bottom: 0;
				background-color: rgb(0,0,0,0);
				transition: all ease .5s;
			}
			.area:hover{
				background-color: rgb(0,0,0,0.5);
			}
			.areaname{
				position: absolute;
				width: 100%;
				height: 20px;
				font-weight: bold;
				font-size: 20px;
				color: white;
				text-align: center;
				top: 0;
				left: -100%;
				transition: all ease .5s;
				
			}
			.area:hover .areaname{
				left: 0;
			}
			.areastory{
				position: absolute;
				width: 70%;
				height: 100%;
				text-align: center;
				left: 50px;
				color: white;
				top: 100%;
				transition: all ease .5s;
			}
			.area:hover .areastory{
				top: 0;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div class="top">
			
		</div>
		<div class="left">
			<img src="img/xiatouxiang.png" width="260px" height="100px">
			<div class="content">
				<br/>
				<br/>
				 “你知道羽毛能有多锋利么？”

				<br/>
				<br/>
				 
				 ~ 霞
			</div>
			<div class="aiouniya">
				
			</div>
			<div class="area">
				<div class="areaname">
					艾欧尼亚
				</div>
				<div class="areastory">
					<br/>
					<br/>
					   在凶险海域环绕中，
					诸多同盟省份在一片被称为“初生之土”的庞大群岛上组成了艾欧尼亚。
					追寻万物的平衡是这里长久以来的文化基调，
					因此物质与精神领域之间的界限也在这里若有若无，
					在野外的森林和山脉中尤为如此。
				</div>
			</div>
		</div>
		<div class="right">
			<font class="title">漫天飞雨！</font>
			<br/>
			<div class="story">
				<font class="name"><ins>身</ins></font>
				为瓦斯塔亚的志士，
				霞要掀起一场革命来拯救她的族群。她身法敏捷又慧心独具，
				凭借锋芒逼人的羽刃，
				扫除任何异己。霞与她的灵魂伴侣洛并肩作战，
				共同守护他们日渐衰落的部族，同时韬光养晦，
				希望终有一天能率领全族重夺昔日荣光。
			</div>
			<div class="cont">
				<a href="https://yz.lol.qq.com/zh_CN/story/champion/xayah/"><font class="name">阅读传记</font></a>
			</div>
		</div>
	</body>

</html>
