<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>main</title>
		<style>
			body{
				width: 100%;
				margin: 0;
				background-image: url("img/yi22.png");
				background-size: cover;
			}
			div{
				margin-top: 0;
				padding: 0;
			}
			a{
				display: block;
				text-decoration: none;
				color: #FE9A2E;
			}
			.title{
				
				text-align: center;
				color: gold;
				font-size: 50px;
				font-style: italic;
				font-weight: bold;
			}
			.name{
				font-size: 40px;
				font-weight: bold;
				font-style: italic;
			}
			.top{
				width: 100%;
				height: 50px;
				background-image: url("img/topyi.png");
				background-size: cover;
				float: top;
			}
			.left{
				position: relative;
				width: 260px;
				height: 800px;
				float: left;
				background-color: #151515;
				
			}
			.aiouniya{
				position: absolute;
				bottom: 0;
				
				width: 100%;
				height: 32%;
				background-image: url("img/yiaiouniya.png");
				background-size: cover;
			}
			.content{
				position: absolute;
				width: 100%;
				height: 55%;
				
				background-image: linear-gradient(to bottom,#151515,#1C1C1C);
				writing-mode: vertical-lr;
				font-weight: bold;
				font-size: 30px;
				font-style: italic;
				color: white;
				text-align: center;
			}
			.right{
				background-color: rgb(255,255,255,0.6);
				width: 50%;
				height: 800px;
				float: left;
				text-align: center;
			}
			.story{
				padding: 0 200px;
				margin: 50px;
				background-color: rgb(255,255,255,0);
				width: 30%;
			}
			.cont{
				margin:100px ;
				border: gray solid 3px;
				color: gold;
			}
			.area{
				margin: 0;
				pad: 0;
				position: absolute;
				width: 100%;
				height: 32%;
				z-index: 3;
				bottom: 0;
				background-color: rgb(0,0,0,0);
				transition: all ease .5s;
			}
			.area:hover{
				background-color: rgb(0,0,0,0.5);
			}
			.areaname{
				position: absolute;
				width: 100%;
				height: 20px;
				font-weight: bold;
				font-size: 20px;
				color: white;
				text-align: center;
				top: 0;
				left: -100%;
				transition: all ease .5s;
				
			}
			.area:hover .areaname{
				left: 0;
			}
			.areastory{
				position: absolute;
				width: 70%;
				height: 100%;
				text-align: center;
				left: 50px;
				color: white;
				top: 100%;
				transition: all ease .5s;
			}
			.area:hover .areastory{
				top: 0;
				height: 100%;
			}
		</style>
	</head>
	<body>
		<div class="top">
			
		</div>
		<div class="left">
			<img src="img/yitouxiang.png" width="260px" height="100px">
			<div class="content">
				<br/>
				<br/>
				 “最锋利的剑的刀锋
				 也无法与一颗和平的心的平静相匹敌。”
				<br/>
				<br/>
				~ 易
			</div>
			<div class="aiouniya">
				
			</div>
			<div class="area">
				<div class="areaname">
					艾欧尼亚
				</div>
				<div class="areastory">
					<br/>
					<br/>
					   在凶险海域环绕中，
					诸多同盟省份在一片被称为“初生之土”的庞大群岛上组成了艾欧尼亚。
					追寻万物的平衡是这里长久以来的文化基调，
					因此物质与精神领域之间的界限也在这里若有若无，
					在野外的森林和山脉中尤为如此。
				</div>
			</div>
			
		</div>
		<div class="right">
			<font class="title">⊰无极之道⊱</font>
			<br/>
			<div class="story">
				<font class="name"><ins>易</ins></font>
				大师锤炼身体、磨砺心智，直至身心合一。尽管他将暴力作为不得已的选择，
				但他优雅迅猛的剑法总是让这一手段显得尤为快捷。作为无极之道最后的门徒，
				易大师致力于这个门派的传承，用七度洞悉目镜搜寻着最有资格的人，寻找潜在的新弟子。
			</div>
			<div class="cont">
				<a href="https://yz.lol.qq.com/zh_CN/story/champion/masteryi/"><font class="name">阅读传记</font></a>
			</div>
		</div>
	</body>

</html>
